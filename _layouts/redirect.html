<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    {% assign latest = site.data.versions | where: "latest", true | first %}
    {% assign latest_url = latest.id | prepend: '/' | append: '/' %}
    <meta http-equiv="refresh" content="0; url={{ latest_url }}">
    <script>window.location.href = "{{ latest_url }}";</script>
  </head>
  <body>
    Redirecting to <a href="{{ latest_url }}">{{ latest_url }}</a>…
  </body>
</html>
